{% extends 'base.html' %}
{% block title %}首页{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-4 fw-bold mb-3">🗺️ 国内旅游景点分析系统</h1>
    <p class="lead text-muted mb-5">探索全国4800+景点，AI智能规划专属路线</p>
    <div class="row justify-content-center g-4">
        <div class="col-md-3">
            <div class="card p-4 text-center h-100">
                <i class="fas fa-mountain fa-2x text-primary mb-3"></i>
                <h5>景点浏览</h5>
                <p class="text-muted small">浏览全国各地景点信息</p>
                <a href="/travel/list/" class="btn btn-primary mt-auto">立即探索</a>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-4 text-center h-100">
                <i class="fas fa-chart-bar fa-2x text-primary mb-3"></i>
                <h5>数据分析</h5>
                <p class="text-muted small">可视化景点数据分析</p>
                <a href="/ksh/" class="btn btn-primary mt-auto">查看分析</a>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-4 text-center h-100">
                <i class="fas fa-robot fa-2x text-primary mb-3"></i>
                <h5>AI路线推荐</h5>
                <p class="text-muted small">DeepSeek智能规划旅游路线</p>
                <a href="/travel/ai/" class="btn btn-primary mt-auto">开始规划</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
