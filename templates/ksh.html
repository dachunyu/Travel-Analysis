{% extends 'base.html' %}
{% block title %}数据分析{% endblock %}

{% block content %}
<h4 class="fw-bold mb-4"><i class="fas fa-chart-bar text-primary me-2"></i>旅游景点数据分析</h4>

<div class="row g-4">
    <div class="col-md-6">
        <div class="card p-3">
            <h6 class="fw-bold mb-3">景点评分分布</h6>
            <div id="chart1" style="height:300px;"></div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card p-3">
            <h6 class="fw-bold mb-3">票价区间分布</h6>
            <div id="chart5" style="height:300px;"></div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card p-3">
            <h6 class="fw-bold mb-3">各省份景点数量Top20</h6>
            <div id="chart2" style="height:350px;"></div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card p-3">
            <h6 class="fw-bold mb-3">各省份平均评分</h6>
            <div id="chart8" style="height:350px;"></div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card p-3">
            <h6 class="fw-bold mb-3">各城市平均评分Top15</h6>
            <div id="chart4" style="height:350px;"></div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card p-3">
            <h6 class="fw-bold mb-3">景点评分排行Top20</h6>
            <div id="chart7" style="height:350px;"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.0/echarts.min.js"></script>
<script>
    var part1 = {{ part1| safe }};
    var part2 = {{ part2| safe }};
    var part4 = {{ part4| safe }};
    var part5 = {{ part5| safe }};
    var part7 = {{ part7| safe }};
    var part8 = {{ part8| safe }};

    var c1 = echarts.init(document.getElementById('chart1'));
    c1.setOption({ tooltip: { trigger: 'item' }, series: [{ type: 'pie', radius: '60%', data: part1.map(d => ({ name: d['评分区间'], value: d['数量'] })) }] });

    var c5 = echarts.init(document.getElementById('chart5'));
    c5.setOption({ tooltip: { trigger: 'item' }, series: [{ type: 'pie', radius: '60%', data: part5.map(d => ({ name: d['票价区间'], value: d['数量'] })) }] });

    var c2 = echarts.init(document.getElementById('chart2'));
    c2.setOption({ tooltip: { trigger: 'axis' }, xAxis: { type: 'category', data: part2.map(d => d['省份']), axisLabel: { rotate: 45 } }, yAxis: { type: 'value' }, series: [{ type: 'bar', data: part2.map(d => d['景点数量']), color: '#1a73e8' }] });

    var c8 = echarts.init(document.getElementById('chart8'));
    c8.setOption({ tooltip: { trigger: 'axis' }, xAxis: { type: 'category', data: part8.map(d => d['省份']), axisLabel: { rotate: 45 } }, yAxis: { type: 'value', min: 3 }, series: [{ type: 'bar', data: part8.map(d => d['平均评分']), color: '#0d47a1' }] });

    var c4 = echarts.init(document.getElementById('chart4'));
    c4.setOption({ tooltip: { trigger: 'axis' }, xAxis: { type: 'category', data: part4.map(d => d['城市']), axisLabel: { rotate: 45 } }, yAxis: { type: 'value', min: 4 }, series: [{ type: 'bar', data: part4.map(d => d['平均评分']), color: '#34a853' }] });

    var c7 = echarts.init(document.getElementById('chart7'));
    c7.setOption({ tooltip: { trigger: 'axis' }, xAxis: { type: 'category', data: part7.map(d => d['景点名称']), axisLabel: { rotate: 45, fontSize: 10 } }, yAxis: { type: 'value', min: 4 }, series: [{ type: 'bar', data: part7.map(d => d['评分']), color: '#fbbc04' }] });
</script>
{% endblock %}
